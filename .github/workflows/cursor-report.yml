name: Cursor Usage Report

on:
  schedule:
    # TEMP TEST: ~9:35 PM IST Fri = 15:35 UTC — revert to "5 14 * * 1-5" after test
    - cron: "35 15 * * 5"
  workflow_dispatch:

jobs:
  cursor-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      CRON_TIMEZONE: Asia/Kolkata
      REPORT_TIMEZONE: Asia/Kolkata
    steps:
      - uses: actions/checkout@v4

      - name: Verify Mon–Fri evening IST schedule
        run: bash scripts/verify-ist-schedule.sh cursor

      - name: Load shared host URLs
        id: host
        run: |
          echo "api_url=$(jq -r .apiUrl config/team-host.json)" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=$(jq -r .dashboardUrl config/team-host.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Capture screenshot and post to Google Chat
        env:
          API_URL: ${{ steps.host.outputs.api_url }}
          DASHBOARD_URL: ${{ steps.host.outputs.dashboard_url }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          REPORT_ACCESS_TOKEN: ${{ secrets.REPORT_ACCESS_TOKEN }}
          CURSOR_SESSION_TOKEN: ${{ secrets.CURSOR_SESSION_TOKEN }}
          CURSOR_DISPLAY_NAME: ${{ secrets.CURSOR_DISPLAY_NAME }}
          CURSOR_EMAIL: ${{ secrets.CURSOR_EMAIL }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: npm run report:cursor
